<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperTab | Markdown 转三线表工具</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>PaperTab</h1>
            <p>专业的 Markdown 转 LaTeX 三线表 (Three-line Table) 排版工具</p>
        </header>

        <main>
            <div class="panel input-panel">
                <div class="panel-header">
                    <h2>📥 输入数据 (Markdown)</h2>
                </div>
                <div class="input-group">
                    <label for="table-title">表题 (可选)：</label>
                    <input type="text" id="table-title" placeholder="例如：用户表设计，留空则自动提取或默认" />
                </div>
                <div class="input-group flex-fill">
                    <label for="markdown-input">Markdown 表格内容：</label>
                    <textarea id="markdown-input" placeholder="将 Markdown 表格粘贴在此处..."></textarea>
                </div>
                <button id="convert-btn" class="primary-btn">✨ 转换为三线表</button>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <h2>📤 输出结果</h2>
                </div>
                
                <div class="tabs">
                    <button class="tab-btn active" data-target="latex-view">LaTeX 代码</button>
                    <button class="tab-btn" data-target="word-view">Word 预览复制</button>
                </div>

                <div id="latex-view" class="tab-content active view-area">
                    <div class="action-bar">
                        <span class="hint">需环境支持 \usepackage{booktabs}</span>
                        <button id="copy-latex-btn" class="secondary-btn">复制 LaTeX 代码</button>
                    </div>
                    <textarea id="latex-output" readonly placeholder="LaTeX 代码将在此生成..."></textarea>
                </div>

                <div id="word-view" class="tab-content view-area">
                    <div class="action-bar">
                        <span class="hint">可直接选中表格 Ctrl+C，或点击右侧按钮复制用于贴入 Word</span>
                        <button id="copy-word-btn" class="secondary-btn">复制富文本表格</button>
                    </div>
                    <div id="word-preview" class="preview-box">
                        <div class="placeholder-text">富文本预览将在此显示...</div>
                    </div>
                </div>
            </div>
        </main>
        
        <div id="toast" class="toast">复制成功！</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
